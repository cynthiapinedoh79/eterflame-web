<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>PDF Tool — Aythnyk</title>
  {% load static %}
  <style>
    body { font-family: 'Georgia', serif; background: #0a0804; color: #f5e0b0; padding: 60px 40px; }
    h1 { font-size: 1rem; letter-spacing: 6px; text-transform: uppercase; color: #c49a40; margin-bottom: 8px; }
    p { font-size: 0.75rem; color: #666; letter-spacing: 2px; margin-bottom: 40px; }
    table { width: 100%; border-collapse: collapse; }
    td { padding: 14px 0; border-bottom: 1px solid #1e1508; vertical-align: middle; }
    .poem-title { font-size: 1rem; color: #f5e0b0; }
    .poem-collection { font-size: 0.65rem; letter-spacing: 3px; color: #c8102e; text-transform: uppercase; padding-left: 20px; }
    .btn-pdf {
      display: inline-block;
      background: #c49a40;
      color: #0a0804;
      padding: 8px 22px;
      text-decoration: none;
      font-size: 0.6rem;
      letter-spacing: 4px;
      text-transform: uppercase;
      font-weight: 700;
      transition: background 0.2s;
    }
    .btn-pdf:hover { background: #c8102e; color: #fff; }
  </style>
</head>
<body>
  <h1>🔥 PDF Generator</h1>
  <p>Solo visible para staff · Genera PDFs para subir a Gumroad</p>
  <table>
    {% for poem in poems %}
    <tr>
      <td class="poem-title">{{ poem.title }}</td>
      <td class="poem-collection">{{ poem.collection.name|default:"—" }}</td>
      <td style="text-align:right;">
        <a href="{% url 'poetry:download_pdf' poem.slug %}" target="_blank" class="btn-pdf">
          Generar PDF
        </a>
      </td>
    </tr>
    {% endfor %}
  </table>
</body>
</html>
